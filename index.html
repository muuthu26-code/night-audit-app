<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    
    <!-- iOS Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Night Audit">
    <link rel="apple-touch-icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/svgs/solid/moon.svg">

    <title>Duty Manager Night Rounds Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        body {
            -webkit-tap-highlight-color: transparent;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            background-color: #f8fafc;
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        header {
            padding-top: calc(1rem + var(--sat));
            margin-top: calc(0px - var(--sat));
        }

        input, textarea {
            font-size: 16px !important;
        }

        @media print {
            body { background-color: white !important; color: black !important; font-size: 11px !important; line-height: 1.4 !important; padding: 0 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-border { border: 1px solid #cbd5e1 !important; }
            .print-page-break { page-break-inside: avoid; }
            input, textarea { border: none !important; border-bottom: 1px solid #e2e8f0 !important; border-radius: 0 !important; background: transparent !important; }
            
            .photo-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                margin-top: 10px;
                page-break-inside: avoid;
            }

            .photo-preview img { 
                height: 200px !important;
                width: 100% !important;
                object-fit: cover !important;
                border: 1.5px solid #e2e8f0;
                border-radius: 8px;
            }
            main { padding: 0 !important; }
            .meta-section { margin-bottom: 30px; }
        }

        .selected-compliant { background-color: #0d9488 !important; color: white !important; border-color: #0d9488 !important; }
        .selected-non-compliant { background-color: #e11d48 !important; color: white !important; border-color: #e11d48 !important; }
        .selected-na { background-color: #475569 !important; color: white !important; border-color: #475569 !important; }
        
        .photo-preview img {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .status-toast {
            display: none;
            position: fixed;
            top: calc(1.5rem + var(--sat));
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            animation: slideDownFade 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideDownFade {
            from { transform: translate(-50%, -20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .floating-action-area {
            padding-bottom: calc(1.25rem + var(--sab));
        }

        textarea { transition: all 0.2s ease; }

        /* Save Button Interaction */
        #save-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        #save-btn:active:not(:disabled) { transform: scale(0.92); }
        .loading-pulse { animation: pulse-teal 1.5s infinite; pointer-events: none; }
        @keyframes pulse-teal {
            0% { box-shadow: 0 0 0 0 rgba(13, 148, 136, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(13, 148, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(13, 148, 136, 0); }
        }

        /* Modal Backdrop */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body class="text-slate-800 antialiased font-sans">

    <!-- Save Confirmation Toast -->
    <div id="status-toast" class="status-toast no-print">
        <div id="toast-content" class="bg-white/95 backdrop-blur shadow-2xl border border-slate-100 px-6 py-4 rounded-3xl flex items-center gap-3">
            <!-- Content dynamic via JS -->
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal-backdrop no-print">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div class="w-16 h-16 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <h3 class="text-xl font-black text-center text-slate-900 mb-2">New Audit?</h3>
            <p class="text-slate-500 text-center font-medium mb-8">This will start a fresh form. Your current draft will be saved locally.</p>
            <div class="flex gap-3">
                <button onclick="app.closeModal()" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-sm">CANCEL</button>
                <button onclick="app.confirmNewAudit()" class="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black text-sm shadow-lg shadow-rose-600/30">YES, START NEW</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-teal-700 text-white p-4 sticky top-0 z-50 shadow-md no-print">
        <div class="max-w-3xl mx-auto flex justify-between items-center w-full">
            <div>
                <h1 class="font-bold text-lg leading-tight tracking-tight">Duty Manager Audit</h1>
                <p id="audit-id-display" class="text-[9px] font-black opacity-50 uppercase tracking-widest mt-0.5">Session: Loading...</p>
            </div>
            <button onclick="app.promptNewAudit()" class="bg-teal-800/50 hover:bg-teal-600 border border-teal-500/30 px-3 py-2 rounded-xl flex items-center gap-2 transition-all active:scale-95">
                <i class="fa-solid fa-plus-circle"></i>
                <span class="text-[10px] font-black uppercase tracking-wider">New</span>
            </button>
        </div>
    </header>

    <!-- Print Header -->
    <div class="hidden print-only mb-8 text-center border-b-4 border-teal-800 pb-6">
        <h1 class="font-black text-3xl uppercase text-teal-900 mb-1">Night Rounds Audit Report</h1>
        <p class="text-sm text-slate-500 font-bold uppercase tracking-[0.3em]">Duty Manager Operations Checklist</p>
    </div>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto p-4 pb-32 w-full">
        
        <!-- Meta Form -->
        <div class="bg-white p-6 rounded-3xl border border-slate-200 mb-8 shadow-sm print-border meta-section">
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Audit Date</label>
                    <input type="date" id="audit-date" class="w-full text-sm font-bold bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 text-slate-700">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Audit Time</label>
                    <input type="time" id="audit-time" class="w-full text-sm font-bold bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 text-slate-700">
                </div>
                <div class="col-span-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Duty Manager</label>
                    <input type="text" id="dm-name" placeholder="Enter Full Name" class="w-full text-sm font-bold bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 text-slate-700">
                </div>
            </div>
        </div>

        <!-- Checklist Container -->
        <div id="checklist-container"></div>

        <!-- Final Handover -->
        <div class="bg-white p-8 rounded-3xl border border-slate-200 mt-8 shadow-sm print-border print-page-break">
            <h3 class="font-black text-base text-teal-900 mb-6 border-b-2 border-slate-100 pb-4 uppercase tracking-wider">Final Shift Handover</h3>
            
            <div class="mb-6">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Summary of Shift & Findings</label>
                <textarea id="final-summary" rows="5" placeholder="Document any critical incidents, maintenance escalations, or follow-ups..." class="w-full text-sm font-medium bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-teal-500 text-slate-700 resize-none leading-relaxed"></textarea>
            </div>

            <!-- Handover Photo Evidence -->
            <div class="mb-8 no-print">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Handover Evidence (Multiple Photos)</label>
                <button onclick="app.triggerPhotoUpload('handover')" class="w-full h-14 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold hover:bg-teal-50 hover:text-teal-600 hover:border-teal-200 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-camera-retro text-xl"></i>
                    <span>Attach Handover Photo</span>
                </button>
                <div id="handover-photos-preview" class="grid grid-cols-2 gap-3 mt-4"></div>
            </div>

            <!-- Restored Print Only Container for Handover Photos -->
            <div class="hidden print-only mb-8" id="handover-photos-print"></div>
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Handover To</label>
                    <input type="text" id="handover-name" placeholder="Manager Name" class="w-full text-sm font-bold bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 text-slate-700">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Handover Time</label>
                    <input type="time" id="handover-time" class="w-full text-sm font-bold bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 text-slate-700">
                </div>
            </div>

            <div class="hidden print-only mt-20 grid grid-cols-2 gap-16">
                <div class="border-t-2 border-slate-900 pt-4 text-center text-xs font-black uppercase tracking-widest">Duty Manager Signature</div>
                <div class="border-t-2 border-slate-900 pt-4 text-center text-xs font-black uppercase tracking-widest">AM Shift Manager Signature</div>
            </div>
        </div>

    </main>

    <!-- Floating Action Area -->
    <div class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200 px-4 pt-4 pb-6 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.1)] z-40 no-print floating-action-area">
        <div class="max-w-3xl mx-auto flex gap-4 w-full justify-between items-center">
            <button onclick="window.print()" class="flex-none w-14 h-14 flex items-center justify-center bg-slate-100 text-slate-600 rounded-2xl font-black text-xs border border-slate-200 hover:bg-slate-200 transition-all active:scale-95">
                <i class="fa-solid fa-file-pdf text-lg"></i>
            </button>
            <button id="save-btn" onclick="app.saveProgress()" class="flex-none px-6 h-14 flex items-center justify-center bg-slate-100 text-teal-600 rounded-2xl font-black text-xs border border-teal-200 hover:bg-teal-50 transition-all">
                <span id="save-btn-content" class="flex items-center gap-2">
                    <i class="fa-solid fa-floppy-disk text-lg"></i> 
                    <span>SAVE</span>
                </span>
            </button>
            <button id="submit-btn" onclick="app.completeAudit()" class="flex-1 h-14 bg-teal-600 text-white rounded-2xl font-black text-sm shadow-xl shadow-teal-600/40 hover:bg-teal-700 transition-all active:scale-95 flex items-center justify-center gap-3">
                <i class="fa-solid fa-circle-check text-xl"></i> COMPLETE
            </button>
        </div>
    </div>

    <script>
        const auditData = [
            { category: "MAIN PORCH", items: [{ text: "Manning Valet & LP Team." }, { text: "Overall Cleanliness." }, { text: "Exit Gate Locked." }] },
            { 
                category: "LOBBY & RECEPTION", 
                items: [
                    { text: "Lobby seating area furniture arrangement." }, 
                    { text: "Floor/carpet cleaning condition." }, 
                    { text: "Reception desk/Back office cleanliness." }, 
                    { text: "Luggage Room: Secured and organized. No unattended luggage left in the lobby." }, 
                    { text: "Public Restroom cleanliness." }, 
                    { text: "Lobby Ambience: Lighting dimmed to night settings, temperature comfortable." }, 
                    { text: "Any abnormal smell/noise." }, 
                    { text: "Was lobby music switched off at 23.00 hrs." },
                    { text: "VIP Movements: Review late night or early morning VIP arrivals/departures; ensure arrangements are ready." },
                    { text: "Check all digital signage for correct signages." }, 
                    { text: "Is the hotel EV car fully charged." }, 
                    { text: "Is hotel EV car key handed over to DM." }, 
                    { text: "Conduct a floor check of the M-floor lobby for standards and for any potential security breaches." }
                ] 
            },
            { 
                category: "SECURITY & LIFE SAFETY", 
                items: [
                    { text: "Key Control Audit: Audit the key log to ensure all department keys were properly signed in by the departing evening staff." }, 
                    { text: "Security Control Room: Staff alert & CCTV functioning." }, 
                    { text: "Fire Panel: No faults or disabled zones." }, 
                    { text: "Entrance & Exit: Ensure required doors are locked/secured according to night protocols." }, 
                    { text: "Along with the LP team, check the 1st floor for any security breach, including the service & guest staircase." }, 
                    { text: "Emergency Exits: Stairwells clear & lit." }, 
                    { text: "Perimeter Check: Walk the exterior perimeter. Check exterior lighting, parking security, and landscaping." }
                ] 
            },
            { 
                category: "PUBLIC AREAS & HOUSEKEEPING", 
                items: [
                    { text: "Elevators: Clean (mirrors, floors, panels) and functioning smoothly." }, 
                    { text: "Ensure the Fitness Centre, Wet Area, and SPA remain under lock and key by verifying all access control points." }
                ] 
            },
            { category: "POOL AREA", items: [{ text: "Pool lighting is on." }, { text: "Check for overall cleanliness." }, { text: "Pool area perimeter check." }] },
            { 
                category: "FOOD & BEVERAGE", 
                items: [
                    { text: "Outlet Security: All outlets locked." }, 
                    { text: "Events Lawn: Smoking poles clean." }, 
                    { text: "Events Hall: Monitor setup & activities." }, 
                    { text: "IRD: Staff alert, kitchen clean." }, 
                    { text: "Spring: Cleanliness & staff attentiveness." }
                ] 
            },
            { category: "GUEST CORRIDORS & FLOORS", items: [{ text: "Lighting: All corridor lights functioning." }, { text: "Noise Levels: Address disturbances immediately." }, { text: "Room Service: Corridors clear of trays." }, { text: "Housekeeping: No carts left in corridors." }] },
            { 
                category: "BACK OF HOUSE (BOH) & HEART OF HOUSE", 
                items: [
                    { text: "Samovar: Cleanliness & food quality." }, 
                    { text: "Locker rooms: Clean, well-lit, secure, and no unauthorised stay-overs." }, 
                    { text: "Receiving Area: Gates locked & clean." }, 
                    { text: "Garbage Area: Clean and secure to prevent pest issues." }
                ] 
            },
            { category: "CAR PARKING & DRIVERS' RESTROOM", items: [{ text: "Car parking area cleanliness." }, { text: "Drivers' restroom cleanliness." }] }
        ];

        window.app = {
            flatItems: [],
            totalItems: 0,
            auditId: localStorage.getItem('night_audit_session_id') || `audit_${Date.now()}`,
            isSaving: false,
            handoverPhotos: [],
            
            init() {
                localStorage.setItem('night_audit_session_id', this.auditId);
                document.getElementById('audit-id-display').innerText = `Session: ${this.auditId}`;
                
                const dateEl = document.getElementById('audit-date');
                const timeEl = document.getElementById('audit-time');
                if (dateEl) dateEl.valueAsDate = new Date();
                if (timeEl) {
                    const now = new Date();
                    timeEl.value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                }

                this.initializeItems();
                
                // Load saved progress from Local Storage immediately
                this.loadProgress();

                this.render();
                this.updateProgress();

                // Auto-save to Local Storage every 2 minutes
                setInterval(() => this.saveProgress(true), 120000); 
            },

            initializeItems() {
                this.flatItems = [];
                let gIdx = 0;
                auditData.forEach((cat, cIdx) => {
                    cat.items.forEach((item, iIdx) => {
                        this.flatItems.push({ 
                            ...item, gIdx, cIdx, iIdx, 
                            status: null, remarks: "", photos: []
                        });
                        gIdx++;
                    });
                });
                this.totalItems = this.flatItems.length;
            },

            promptNewAudit() {
                document.getElementById('confirm-modal').style.display = 'flex';
            },

            closeModal() {
                document.getElementById('confirm-modal').style.display = 'none';
            },

            confirmNewAudit() {
                this.closeModal();
                this.auditId = `audit_${Date.now()}`;
                localStorage.setItem('night_audit_session_id', this.auditId);
                document.getElementById('audit-id-display').innerText = `Session: ${this.auditId}`;
                
                // Reset local state
                this.initializeItems();
                this.handoverPhotos = [];
                
                // Reset DOM elements
                const fields = ['dm-name', 'final-summary', 'handover-name', 'handover-time'];
                fields.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = "";
                });
                const dateEl = document.getElementById('audit-date');
                if (dateEl) dateEl.valueAsDate = new Date();
                
                this.render();
                this.updateProgress();
                this.showToast('success', 'New audit session started');
            },

            showToast(type, message) {
                const toast = document.getElementById('status-toast');
                const content = document.getElementById('toast-content');
                
                if (type === 'success') {
                    content.innerHTML = `<i class="fa-solid fa-check-circle text-emerald-500 text-2xl"></i><div class="flex flex-col"><span class="text-[12px] font-black uppercase text-emerald-900 tracking-wider">Save Complete</span><span class="text-[10px] text-emerald-600 font-bold">${message || 'Progress saved to device'}</span></div>`;
                } else if (type === 'error') {
                    content.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-rose-500 text-2xl"></i><div class="flex flex-col"><span class="text-[12px] font-black uppercase text-rose-900 tracking-wider">Storage Error</span><span class="text-[10px] text-rose-600 font-bold">Device storage may be full</span></div>`;
                }

                toast.style.display = 'block';
                setTimeout(() => { 
                    toast.style.opacity = '0';
                    setTimeout(() => {
                        toast.style.display = 'none';
                        toast.style.opacity = '1';
                    }, 400);
                }, 2500);
            },

            saveProgress(isAuto = false) {
                if (this.isSaving) return;
                this.isSaving = true;
                
                const btn = document.getElementById('save-btn');
                const btnContent = document.getElementById('save-btn-content');
                
                if (!isAuto) {
                    btn.disabled = true;
                    btn.classList.add('loading-pulse');
                    btnContent.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin text-lg"></i><span>SAVING...</span>`;
                }

                try {
                    // Create data object for Local Storage
                    const dataToSave = {
                        date: document.getElementById('audit-date')?.value || "",
                        time: document.getElementById('audit-time')?.value || "",
                        dmName: document.getElementById('dm-name')?.value || "",
                        summary: document.getElementById('final-summary')?.value || "",
                        handoverName: document.getElementById('handover-name')?.value || "",
                        handoverTime: document.getElementById('handover-time')?.value || "",
                        handoverPhotos: this.handoverPhotos,
                        updatedAt: new Date().toISOString(),
                        responses: this.flatItems.map(item => ({
                            gIdx: item.gIdx,
                            status: item.status,
                            remarks: item.remarks,
                            photos: item.photos
                        }))
                    };

                    // Save directly to browser Local Storage
                    localStorage.setItem(`night_audit_data_${this.auditId}`, JSON.stringify(dataToSave));

                    if (!isAuto) {
                        this.showToast('success');
                        btnContent.innerHTML = `<i class="fa-solid fa-check text-emerald-600 text-lg"></i><span class="text-emerald-700">SAVED</span>`;
                        setTimeout(() => {
                            if(btnContent) btnContent.innerHTML = `<i class="fa-solid fa-floppy-disk text-lg"></i><span>SAVE</span>`;
                        }, 2000);
                    }
                } catch (e) { 
                    console.error("Local Storage Save failed:", e);
                    if (!isAuto) {
                        this.showToast('error');
                        btnContent.innerHTML = `<i class="fa-solid fa-floppy-disk text-lg"></i><span>SAVE</span>`;
                    }
                } finally {
                    this.isSaving = false;
                    if(btn) {
                        btn.classList.remove('loading-pulse');
                        btn.disabled = false;
                    }
                }
            },

            loadProgress() {
                try {
                    const savedDataString = localStorage.getItem(`night_audit_data_${this.auditId}`);
                    if (savedDataString) {
                        const d = JSON.parse(savedDataString);
                        
                        // Restore Meta fields
                        const fields = {
                            'audit-date': d.date, 'audit-time': d.time, 'dm-name': d.dmName,
                            'final-summary': d.summary, 'handover-name': d.handoverName, 'handover-time': d.handoverTime
                        };
                        Object.entries(fields).forEach(([id, val]) => {
                            const el = document.getElementById(id);
                            if (el) el.value = val || "";
                        });
                        this.handoverPhotos = d.handoverPhotos || [];

                        // Restore Responses
                        if (d.responses && Array.isArray(d.responses)) {
                            d.responses.forEach(r => {
                                const item = this.flatItems.find(i => i.gIdx === r.gIdx);
                                if (item) {
                                    item.status = r.status; 
                                    item.remarks = r.remarks || "";
                                    item.photos = r.photos || [];
                                }
                            });
                        }
                    }
                } catch (e) { 
                    console.error("Local Storage load failed:", e); 
                }
            },

            updateItemStatus(gIdx, status) {
                if (typeof gIdx !== 'number' || gIdx >= this.flatItems.length) return;
                this.flatItems[gIdx].status = status;
                const card = document.querySelector(`[data-idx="${gIdx}"]`);
                if (card) {
                    card.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected-compliant', 'selected-non-compliant', 'selected-na'));
                    const active = card.querySelector(`[data-status="${status}"]`);
                    if (active) active.classList.add(`selected-${status}`);
                }
                this.updateProgress();
            },

            updateRemarks(gIdx, val) { 
                if (typeof gIdx === 'number' && gIdx < this.flatItems.length) {
                    this.flatItems[gIdx].remarks = val; 
                }
            },

            updateProgress() {
                const comp = this.flatItems.filter(i => i.status !== null).length;
                const btn = document.getElementById('submit-btn');
                if (comp === this.totalItems && btn) {
                    btn.classList.replace('bg-teal-600', 'bg-emerald-500');
                }
            },

            triggerPhotoUpload(target) {
                const input = document.createElement('input');
                input.type = 'file'; 
                input.accept = 'image/jpeg, image/png'; 
                input.capture = 'environment';
                
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (file) {
                        if (!file.type.startsWith('image/')) return;
                        const reader = new FileReader();
                        reader.onload = ev => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const ctx = canvas.getContext('2d');
                                
                                // EXACT 600x450 (4:3) size for uniform print display and guaranteed low file size
                                const targetW = 600; 
                                const targetH = 450;
                                canvas.width = targetW; canvas.height = targetH;
                                
                                // Smart center-crop to maintain clarity without stretching
                                const imgRatio = img.width / img.height;
                                const targetRatio = targetW / targetH;
                                let sWidth = img.width, sHeight = img.height, sX = 0, sY = 0;
                                
                                if (imgRatio > targetRatio) {
                                    sWidth = img.height * targetRatio;
                                    sX = (img.width - sWidth) / 2;
                                } else {
                                    sHeight = img.width / targetRatio;
                                    sY = (img.height - sHeight) / 2;
                                }
                                
                                ctx.drawImage(img, sX, sY, sWidth, sHeight, 0, 0, targetW, targetH);
                                
                                const ts = new Date().toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }).toUpperCase();
                                ctx.font = `bold 20px sans-serif`;
                                ctx.textAlign = "right"; ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                                ctx.shadowColor = "rgba(0,0,0,0.8)"; ctx.shadowBlur = 6;
                                ctx.fillText(ts, targetW - 20, targetH - 20);

                                // 0.7 compression balances clarity with small file size to easily keep PDF < 10MB
                                const data = canvas.toDataURL('image/jpeg', 0.7); 
                                if (!data.startsWith('data:image/jpeg;base64,')) return;
                                
                                if (target === 'handover') {
                                    this.handoverPhotos.push(data);
                                    this.renderHandoverPhotos();
                                } else if (typeof target === 'number' && target < this.flatItems.length) {
                                    this.flatItems[target].photos.push(data);
                                    this.render(); 
                                }
                            };
                            img.src = ev.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            },

            render() {
                const container = document.getElementById('checklist-container');
                if (!container) return;
                let html = '';
                let gIdx = 0;
                auditData.forEach((category) => {
                    html += `<div class="mb-12 print-page-break">
                                <h2 class="sticky top-[calc(60px+var(--sat))] z-30 bg-[#f8fafc]/95 backdrop-blur-md py-4 mb-4 font-black text-xs text-teal-800 uppercase tracking-[0.2em] border-b-2 border-teal-600/30 no-print shadow-sm px-2">
                                    ${this.escapeHTML(category.category)}
                                </h2>
                                <h2 class="hidden print-only font-black text-xl text-teal-800 border-b-4 border-teal-800 mb-6 pb-2 mt-10">
                                    ${this.escapeHTML(category.category)}
                                </h2>`;
                    
                    category.items.forEach((item) => {
                        const state = this.flatItems[gIdx];
                        
                        // RESTORED PRINT LAYOUT
                        html += `
                            <div class="hidden print-only mb-8 pb-8 border-b border-slate-200">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="flex-1 pr-8">
                                        <span class="font-black mr-3 text-slate-300 text-lg">${gIdx + 1}.</span>
                                        <span class="font-bold text-slate-900 text-[14px]">${this.escapeHTML(item.text)}</span>
                                    </div>
                                    <div class="w-36 text-right font-black text-[12px] uppercase tracking-tighter text-teal-900">
                                        Result: ${state.status ? state.status.replace('-', ' ') : 'NOT AUDITED'}
                                    </div>
                                </div>
                                ${state.remarks ? `<div class="text-[11px] text-slate-600 italic ml-10 mb-4 p-4 bg-slate-50 border-l-4 border-slate-300 rounded-r-lg">Findings: ${this.escapeHTML(state.remarks)}</div>` : ''}
                                ${state.photos.length > 0 ? `<div class="photo-grid ml-10">${state.photos.map(p => `<div class="photo-preview"><img src="${p}"></div>`).join('')}</div>` : ''}
                            </div>
                            
                            <!-- INTERACTIVE NO-PRINT LAYOUT -->
                            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 mb-6 shadow-sm no-print" data-idx="${gIdx}">
                                <div class="flex justify-between items-start mb-6">
                                    <span class="text-[10px] font-black text-slate-200 w-6 mt-1 flex-none">${gIdx + 1}.</span>
                                    <p class="text-[15px] font-bold text-slate-800 flex-1 ml-2 leading-tight">${this.escapeHTML(item.text)}</p>
                                </div>
                                <div class="space-y-6">
                                    <div class="flex gap-2.5 w-full">
                                        <button onclick="app.updateItemStatus(${gIdx}, 'compliant')" data-status="compliant" class="status-btn flex-1 py-4 border-2 border-slate-50 rounded-2xl text-[11px] font-black tracking-[0.1em] transition-all ${state.status === 'compliant' ? 'selected-compliant' : 'bg-slate-50 text-slate-400'}">YES</button>
                                        <button onclick="app.updateItemStatus(${gIdx}, 'non-compliant')" data-status="non-compliant" class="status-btn flex-1 py-4 border-2 border-slate-50 rounded-2xl text-[11px] font-black tracking-[0.1em] transition-all ${state.status === 'non-compliant' ? 'selected-non-compliant' : 'bg-slate-50 text-slate-400'}">NO</button>
                                        <button onclick="app.updateItemStatus(${gIdx}, 'na')" data-status="na" class="status-btn flex-1 py-4 border-2 border-slate-50 rounded-2xl text-[11px] font-black tracking-[0.1em] transition-all ${state.status === 'na' ? 'selected-na' : 'bg-slate-50 text-slate-400'}">N/A</button>
                                    </div>
                                    
                                    <div class="flex gap-3 items-start w-full">
                                        <textarea id="remarks-${gIdx}" oninput="app.updateRemarks(${gIdx}, this.value)" placeholder="Observations..." class="flex-1 w-full text-sm font-semibold bg-slate-50 border-2 border-slate-50 rounded-2xl px-5 py-4 focus:outline-none focus:border-teal-500 focus:bg-white text-slate-600 resize-none min-h-[56px]" rows="1">${this.escapeHTML(state.remarks)}</textarea>
                                        
                                        <button onclick="app.triggerPhotoUpload(${gIdx})" class="evidence-btn w-[56px] h-[56px] flex-none flex items-center justify-center bg-slate-50 text-slate-400 rounded-2xl border-2 border-slate-50 transition-all ${state.photos.length > 0 ? 'bg-teal-50 text-teal-600 border-teal-200' : ''}">
                                            <i class="fa-solid fa-camera text-2xl"></i>
                                        </button>
                                    </div>
                                    
                                    <div id="preview-container-${gIdx}" class="grid grid-cols-2 gap-3 mt-4 ${state.photos.length > 0 ? '' : 'hidden'}">
                                        ${state.photos.map((p, pIdx) => `
                                            <div class="photo-preview border-2 border-slate-100 rounded-3xl overflow-hidden relative group">
                                                <img src="${p}">
                                                <button onclick="app.removePhoto(${gIdx}, ${pIdx})" class="absolute top-2 right-2 bg-rose-500 text-white w-8 h-8 rounded-xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-trash-can text-sm"></i></button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>`;
                        gIdx++;
                    });
                    html += `</div>`;
                });
                container.innerHTML = html;
                this.renderHandoverPhotos();
            },

            renderHandoverPhotos() {
                const preview = document.getElementById('handover-photos-preview');
                const print = document.getElementById('handover-photos-print'); // RESTORED PRINT BINDING
                
                const html = this.handoverPhotos.map((p, pIdx) => `<div class="photo-preview border-2 border-slate-100 rounded-3xl overflow-hidden relative group"><img src="${p}"><button onclick="app.removeHandoverPhoto(${pIdx})" class="absolute top-2 right-2 bg-rose-500 text-white w-8 h-8 rounded-xl flex items-center justify-center shadow-lg no-print"><i class="fa-solid fa-trash-can text-sm"></i></button></div>`).join('');
                
                if (preview) preview.innerHTML = html;
                if (print) print.innerHTML = `<div class="photo-grid">${html}</div>`; // RESTORED PRINT INJECTION
            },

            escapeHTML(str) {
                if (!str) return "";
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },

            removePhoto(idx, photoIdx) {
                if (typeof idx === 'number' && this.flatItems[idx]) {
                    this.flatItems[idx].photos.splice(photoIdx, 1);
                    this.saveProgress(true); // Auto-save on delete
                    this.render();
                }
            },

            removeHandoverPhoto(pIdx) {
                this.handoverPhotos.splice(pIdx, 1);
                this.saveProgress(true); // Auto-save on delete
                this.renderHandoverPhotos();
            },

            completeAudit() { 
                this.saveProgress(); 
                window.print(); 
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
